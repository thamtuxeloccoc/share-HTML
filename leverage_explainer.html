
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0;display:flex;flex-direction:column;gap:16px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem 1.5rem}
.label{font-size:13px;color:var(--color-text-secondary);margin-bottom:4px}
.section-title{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.slider-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.slider-label{font-size:13px;color:var(--color-text-secondary);width:120px;flex-shrink:0}
.slider-val{font-size:14px;font-weight:500;color:var(--color-text-primary);width:80px;text-align:right;flex-shrink:0}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem}
.metric-lbl{font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric-val{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.metric-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.divider{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:12px 0}
.scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.scenario{border-radius:var(--border-radius-md);padding:.85rem 1rem;border:0.5px solid var(--color-border-tertiary)}
.sc-title{font-size:12px;font-weight:500;margin-bottom:6px}
.sc-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.sc-label{color:var(--color-text-tertiary)}
.sc-val{font-weight:500}
.profit{color:#0F6E56}
.loss{color:#A32D2D}
.warn-box{border-radius:var(--border-radius-md);padding:.85rem 1rem;border:0.5px solid #F5C4B3;background:#FAECE710;margin-top:12px}
.warn-title{font-size:12px;font-weight:500;color:#993C1D;margin-bottom:4px}
.warn-text{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.visual-bar-wrap{margin:12px 0}
.bar-label-row{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px}
.bar-track{height:24px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden;position:relative;margin-bottom:6px}
.bar-fill{height:100%;border-radius:4px;transition:width .3s}
.bar-caption{font-size:11px;color:var(--color-text-tertiary)}
.lev-examples{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.lev-ex{border-radius:var(--border-radius-md);padding:.6rem .75rem;border:0.5px solid var(--color-border-tertiary);text-align:center;cursor:pointer;transition:all .15s}
.lev-ex:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.lev-ex.active{border-color:#378ADD;background:#E6F1FB18}
.lev-ex-name{font-size:11px;font-weight:500;color:var(--color-text-primary)}
.lev-ex-val{font-size:18px;font-weight:500;color:#185FA5;margin:2px 0}
.lev-ex-type{font-size:10px;color:var(--color-text-tertiary)}
</style>

<div class="wrap">

<div class="card">
  <div class="section-title">Đòn bẩy theo sản phẩm</div>
  <div class="lev-examples" id="lev-examples"></div>
</div>

<div class="card">
  <div class="section-title">Máy tính đòn bẩy</div>

  <div class="slider-row">
    <span class="slider-label">Vốn của bạn</span>
    <input type="range" min="100" max="10000" step="100" value="1000" id="capital" style="flex:1" oninput="calc()">
    <span class="slider-val" id="capital-out">$1,000</span>
  </div>
  <div class="slider-row">
    <span class="slider-label">Đòn bẩy</span>
    <input type="range" min="1" max="100" step="1" value="10" id="leverage" style="flex:1" oninput="calc()">
    <span class="slider-val" id="leverage-out">10x</span>
  </div>
  <div class="slider-row">
    <span class="slider-label">Thị trường thay đổi</span>
    <input type="range" min="-20" max="20" step="0.5" value="5" id="move" style="flex:1" oninput="calc()">
    <span class="slider-val" id="move-out">+5%</span>
  </div>

  <div class="metric-grid" id="metrics"></div>

  <div class="visual-bar-wrap">
    <div class="bar-label-row"><span>Vốn thật bạn bỏ</span><span id="bar1-lbl"></span></div>
    <div class="bar-track"><div class="bar-fill" id="bar1" style="background:#378ADD"></div></div>
    <div class="bar-label-row"><span>Tổng tài sản kiểm soát</span><span id="bar2-lbl"></span></div>
    <div class="bar-track"><div class="bar-fill" id="bar2" style="background:#1D9E75"></div></div>
    <div class="bar-caption">Thanh xanh lá = phần được khuếch đại bởi đòn bẩy</div>
  </div>

  <div class="divider"></div>

  <div class="section-title">Kịch bản lời / lỗ</div>
  <div class="scenario-grid" id="scenarios"></div>
  <div id="warn-area"></div>
</div>

</div>

<script>
const examples = [
  {name:'Cổ phiếu margin',val:'2x',type:'Stocks US',lev:2},
  {name:'Futures MES/MNQ',val:'20x',type:'Micro futures',lev:20},
  {name:'Futures ES/NQ',val:'50x',type:'Standard futures',lev:50},
  {name:'Forex retail',val:'100x',type:'Forex broker',lev:100},
];

let activeLev = 1;

function fmt(n){
  const abs = Math.abs(n);
  if(abs>=1000) return (n<0?'-':'')+'$'+Math.round(abs).toLocaleString();
  return (n<0?'-':'')+'$'+Math.abs(n).toFixed(2);
}
function fmtPct(n){return (n>0?'+':'')+n.toFixed(1)+'%'}

function calc(){
  const capital = +document.getElementById('capital').value;
  const leverage = +document.getElementById('leverage').value;
  const movePct = +document.getElementById('move').value;

  document.getElementById('capital-out').textContent = '$'+capital.toLocaleString();
  document.getElementById('leverage-out').textContent = leverage+'x';
  document.getElementById('move-out').textContent = (movePct>0?'+':'')+movePct+'%';

  const controlled = capital * leverage;
  const pnl = controlled * (movePct/100);
  const pnlPct = (pnl/capital)*100;
  const newCapital = capital + pnl;

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-lbl">Vốn bỏ vào</div><div class="metric-val">$${capital.toLocaleString()}</div><div class="metric-sub">Margin của bạn</div></div>
    <div class="metric"><div class="metric-lbl">Tài sản kiểm soát</div><div class="metric-val">$${controlled.toLocaleString()}</div><div class="metric-sub">${leverage}x đòn bẩy</div></div>
    <div class="metric"><div class="metric-lbl">${movePct>=0?'Lợi nhuận':'Thua lỗ'}</div><div class="metric-val" style="color:${pnl>=0?'#0F6E56':'#A32D2D'}">${fmt(pnl)}</div><div class="metric-sub" style="color:${pnl>=0?'#0F6E56':'#A32D2D'}">${fmtPct(pnlPct)} vốn</div></div>
  `;

  const barMax = controlled;
  document.getElementById('bar1').style.width = Math.min(100,(capital/barMax)*100)+'%';
  document.getElementById('bar2').style.width = '100%';
  document.getElementById('bar1-lbl').textContent = '$'+capital.toLocaleString();
  document.getElementById('bar2-lbl').textContent = '$'+controlled.toLocaleString();

  const scens = [
    {title:'Thị trường +2%',move:2},
    {title:'Thị trường +5%',move:5},
    {title:'Thị trường -2%',move:-2},
    {title:'Thị trường -5%',move:-5},
  ];
  document.getElementById('scenarios').innerHTML = scens.map(s=>{
    const p = controlled*(s.move/100);
    const pp = (p/capital)*100;
    const isProfit = p>=0;
    return `<div class="scenario">
      <div class="sc-title">${s.title}</div>
      <div class="sc-row"><span class="sc-label">PnL</span><span class="sc-val ${isProfit?'profit':'loss'}">${fmt(p)}</span></div>
      <div class="sc-row"><span class="sc-label">% vốn</span><span class="sc-val ${isProfit?'profit':'loss'}">${fmtPct(pp)}</span></div>
      <div class="sc-row"><span class="sc-label">Vốn còn lại</span><span class="sc-val">${fmt(capital+p)}</span></div>
    </div>`;
  }).join('');

  const liquidPct = 100/leverage;
  let warnHtml = '';
  if(leverage >= 10){
    warnHtml = `<div class="warn-box">
      <div class="warn-title">Điểm liquidation / margin call</div>
      <div class="warn-text">Với đòn bẩy ${leverage}x, thị trường chỉ cần đi ngược <strong>${liquidPct.toFixed(1)}%</strong> là bạn mất toàn bộ vốn. Với ES/NQ biến động 1–2%/giờ, điều này có thể xảy ra trong vài phút nếu không có stop-loss.</div>
    </div>`;
  }
  document.getElementById('warn-area').innerHTML = warnHtml;
}

document.getElementById('lev-examples').innerHTML = examples.map((e,i)=>`
  <div class="lev-ex ${i===1?'active':''}" id="lex-${i}" onclick="setLevEx(${i},${e.lev})">
    <div class="lev-ex-name">${e.name}</div>
    <div class="lev-ex-val">${e.val}</div>
    <div class="lev-ex-type">${e.type}</div>
  </div>`).join('');

function setLevEx(idx,lev){
  examples.forEach((_,i)=>document.getElementById('lex-'+i).classList.toggle('active',i===idx));
  document.getElementById('leverage').value=lev;
  calc();
}

calc();
</script>
